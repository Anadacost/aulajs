<body>
    <h1><mark>MANIPULANDO IMAGENS</mark> DO HTML ATRAVÉS DO JS  Aula 2 Desafio  4</h1>
    <hr>
    <div>
        <img width="500px" src="img/barata.png" alt="barata" title="Barata">
        <br>
        <button onclick="trocar_imagem()">TROCAR IMAGEM</button>
    </div>
 
    <script>
              
        const tag_body = document.getElementsByTagName('body')[0];
        tag_body.style.backgroundColor="aquamarine";
        console.log(tag_body);
        
        const tag_div = document.getElementsByTagName('div')[0];
        console.log(tag_div);
        tag_div.style.backgroundColor = "antiquewhite"
        tag_div.style.border = "1px";
        tag_div.style.borderStyle="solid";
        tag_div.style.borderColor="red";

        const tag_img = document.getElementsByTagName('img');


        function trocar_imagem(){
            let tag_img_1 = tag_img[0];
            console.log(tag_img)

            if(tag_img_1.title == "Barata"){
                tag_img_1.src="img/galo.png";
                tag_img_1.title="Galo"                
            }else{
                tag_img_1.src="img/barata.png";
                tag_img_1.title="Barata"

            }
          
           
        }

       
      
        tag_div.style.backgroundColor="rgb(156, 15, 5)"
        tag_div.style.border=" 8px solid hsl(4, 96%, 20%)"
        tag_div.style.padding="0.5"
        tag_div.style.display="block"
        

    </script>
